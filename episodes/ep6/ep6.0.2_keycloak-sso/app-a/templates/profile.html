<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プロフィール — App A</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; }
    a { color: #0066cc; }
    table { border-collapse: collapse; width: 100%; margin-top: 24px; }
    th, td { border: 1px solid #ddd; padding: 10px 14px; text-align: left; }
    th { background: #f5f5f5; width: 220px; }
    td { word-break: break-all; }
    .nav { margin-top: 24px; }
  </style>
</head>
<body>
  <h1>プロフィール <small style="font-size: 0.6em; color: #888;">App A</small></h1>

  <table>
    <thead>
      <tr>
        <th>クレーム</th>
        <th>値</th>
      </tr>
    </thead>
    <tbody>
      {% for key, value in user.items() %}
      <tr>
        <td>{{ key }}</td>
        <td>{{ value }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <div class="nav">
    <a href="/">トップへ戻る</a> |
    <a href="/logout">ログアウト</a>
  </div>
</body>
</html>
